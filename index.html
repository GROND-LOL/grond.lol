<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grond Engine</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #0d1117; 
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="grond-frame" src="https://auxygen-grond.hf.space" allow="accelerometer; ambient-light-sensor; camera; encrypted-media; geolocation; gyroscope; microphone; midi; payment; vr; web-share" allowfullscreen="true"></iframe>

    <script>
        // Automatically force the browser focus into the iframe so keyboard WASD works instantly
        window.onload = function() {
            var iframe = document.getElementById('grond-frame');
            iframe.focus();
            
            // Re-apply focus if the user clicks the black margins outside the iframe
            document.body.addEventListener('click', function() {
                iframe.focus();
            });
        };
    </script>
</body>
</html>
